# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - spanningPlatform
      - spanningAdminEmail
      - spanningApiToken
    properties:
      spanningPlatform:
        type: string
        description: "Platform: 'm365', 'gws', or 'salesforce'"
      spanningAdminEmail:
        type: string
        description: Spanning admin account email
      spanningApiToken:
        type: string
        description: Spanning API token
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { SPANNING_PLATFORM: config.spanningPlatform, SPANNING_ADMIN_EMAIL: config.spanningAdminEmail, SPANNING_API_TOKEN: config.spanningApiToken, MCP_TRANSPORT: 'stdio' } })
